apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: assignment3
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      name: order-service
      labels:
        app: order-service
    spec:
      restartPolicy: Always
      containers:
        - name: order-service
          image: prog3360_assignment2-order-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              protocol: TCP
